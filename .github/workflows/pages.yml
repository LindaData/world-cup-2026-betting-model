name: Publish GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Cache project R library
        uses: actions/cache@v4
        with:
          path: .r-lib
          key: ${{ runner.os }}-r-v2-${{ hashFiles('R/00_setup.R') }}
          restore-keys: |
            ${{ runner.os }}-r-v2-

      # Non-fatal on Pages: a broken R toolchain must never block deploying
      # the committed site HTML and the web app.
      - name: Install R packages
        continue-on-error: true
        run: Rscript R/00_setup.R

      # Fresh render when it works; committed docs/ HTML otherwise, so a
      # render failure never blocks deploying the site and the app.
      - name: Render Quarto site
        continue-on-error: true
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_HOST: v3.football.api-sports.io
          API_FOOTBALL_WORLD_CUP_LEAGUE_ID: "1"
          API_FOOTBALL_SEASON: "2026"
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: quarto render

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # The consolidated web app ships inside the same Pages artifact at /app/.
      # Built after the Quarto render so nothing cleans it out of docs/.
      - name: Build web app into docs/app
        working-directory: apps/web
        env:
          VITE_BASE: /world-cup-2026-betting-model/app/
        run: |
          bun install --frozen-lockfile
          bun run build
          mkdir -p ../../docs/app
          cp -r dist/. ../../docs/app/
          for route in matches research status approval datasets model signals coverage dictionary quality basket explore nba mlb football; do
            mkdir -p "../../docs/app/$route"
            cp dist/index.html "../../docs/app/$route/index.html"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: LindaData Publish Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "_quarto.yml"
      - "index.qmd"
      - "reports/**"
      - "R/**"
      - "styles.css"
      - "assets/**"
      - "data/processed/**"
      - "docs_static/**"
      - ".github/workflows/lindadata-publish-site.yml"

permissions:
  contents: write

concurrency:
  group: lindadata-world-cup-site-publish
  cancel-in-progress: true

jobs:
  render-and-publish:
    name: CTO site render and COO publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LindaData World Cup repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("DBI", "duckdb", "dplyr", "readr", "jsonlite", "glue", "here", "reticulate", "knitr", "rmarkdown", "htmltools", "tidyr", "purrr", "stringr", "lubridate", "ggplot2", "scales", "broom", "MASS"), repos = "https://cloud.r-project.org")'

      - name: Render Quarto site
        run: |
          Rscript -e "source('R/12_render_reports.R')"

      - name: Publish rendered docs
        run: |
          if [[ -n "$(git status --porcelain docs)" ]]; then
            git config user.name "LindaData Site Publisher"
            git config user.email "lindadata-site-publisher@users.noreply.github.com"
            git add docs
            git commit -m "Render LindaData World Cup command center"
            git push
          else
            echo "No docs changes to publish."
          fi

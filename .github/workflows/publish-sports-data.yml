name: Publish sports data

run-name: Publish NBA and MLB data

on:
  workflow_dispatch:
  schedule:
    - cron: "25 9 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/publish_sports_data.py"
      - "scripts/publish_sports_data_free.py"
      - ".github/workflows/publish-sports-data.yml"

permissions:
  contents: write

concurrency:
  group: publish-sports-data
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Pull, normalize, and build dashboard
        id: build
        continue-on-error: true
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        shell: bash
        run: |
          mkdir -p docs/sports-data
          set +e
          python scripts/publish_sports_data_free.py > /tmp/sports-publish.log 2>&1
          code=$?
          cat /tmp/sports-publish.log
          if [ "$code" -eq 0 ]; then
            status="success"
          else
            status="failure"
          fi
          {
            echo "status=$status"
            echo "run_id=$GITHUB_RUN_ID"
            echo "commit=$GITHUB_SHA"
            echo "updated_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "exit_code=$code"
          } > docs/sports-data/build-status.txt
          tail -n 80 /tmp/sports-publish.log > docs/sports-data/build-log.txt
          exit "$code"

      - name: Upload raw API snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-sports-publish-${{ github.run_id }}
          path: data/raw/api_sports_publish/
          if-no-files-found: warn
          retention-days: 3
          compression-level: 9

      - name: Commit publishable summaries and status
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/sports-data/
          if git diff --cached --quiet; then
            echo "No publishable changes."
          else
            git commit -m "Update published NBA and MLB data"
            git push
          fi

      - name: Fail workflow when publishing failed
        if: steps.build.outcome == 'failure'
        run: exit 1

name: Publish sports data

run-name: Publish NBA and MLB data

on:
  workflow_dispatch:
  schedule:
    - cron: "25 9 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/publish_sports_data.py"
      - ".github/workflows/publish-sports-data.yml"

permissions:
  contents: write

concurrency:
  group: publish-sports-data
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull, normalize, and build dashboard
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: python scripts/publish_sports_data.py

      - name: Upload raw API snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-sports-publish-${{ github.run_id }}
          path: data/raw/api_sports_publish/
          if-no-files-found: warn
          retention-days: 3
          compression-level: 9

      - name: Commit publishable summaries
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/sports-data/
          if git diff --cached --quiet; then
            echo "No publishable changes."
          else
            git commit -m "Update published NBA and MLB data"
            git push
          fi

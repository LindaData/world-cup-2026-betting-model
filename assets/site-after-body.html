<script>
(function () {
  "use strict";

  function ready(fn) {
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", fn);
    } else {
      fn();
    }
  }

  function formatLocalTimes() {
    var formatter = new Intl.DateTimeFormat(undefined, {
      weekday: "short",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit",
      timeZoneName: "short"
    });

    document.querySelectorAll("time.js-local-time[datetime]").forEach(function (node) {
      var value = node.getAttribute("datetime");
      if (!value) {
        return;
      }
      var date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return;
      }
      node.textContent = formatter.format(date);
      node.setAttribute("data-localized", "true");
    });
  }

  function initBracket() {
    var dataNode = document.getElementById("wc-bracket-data");
    var root = document.getElementById("model-bracket-root");
    var championNode = document.getElementById("model-bracket-champion");
    var seedWatch = document.getElementById("group-seed-watch");
    var thirdWatch = document.getElementById("third-place-watch");
    var statusNode = document.getElementById("model-bracket-status");
    var tabsNode = document.querySelector(".bracket-tabs");
    var modelPathPanel = document.getElementById("model-path-panel");
    var modelPathSummary = modelPathPanel ? modelPathPanel.querySelector(".model-path-summary") : null;
    var modelPathRounds = modelPathPanel ? modelPathPanel.querySelector(".model-path-rounds") : null;

    if (!dataNode || !root || !championNode) {
      return;
    }

    var data = JSON.parse(dataNode.textContent);
    var roundNames = ["Round of 32", "Round of 16", "Quarterfinals", "Semifinals", "Final"];
    var shortRoundNames = ["R32", "R16", "QF", "SF", "Final"];
    var picks = {};
    var activeRound = 0;
    var fullView = !window.matchMedia("(max-width: 700px)").matches;
    var modelPathOpen = false;

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function announce(text) {
      if (statusNode) {
        statusNode.textContent = text;
      }
    }

    function cloneTeam(team) {
      return team ? Object.assign({}, team) : null;
    }

    function cloneMatch(match) {
      return {
        slotA: match.slotA,
        slotB: match.slotB,
        teamA: cloneTeam(match.teamA),
        teamB: cloneTeam(match.teamB)
      };
    }

    function teamStrength(team) {
      var elo = team && Number(team.elo);
      return Number.isFinite(elo) ? elo : 1500;
    }

    function officialWinner(match) {
      if (!match || !match.fixture || !match.fixture.officialWinner) {
        return null;
      }
      if (match.teamA && match.teamA.name === match.fixture.officialWinner) {
        return match.teamA;
      }
      if (match.teamB && match.teamB.name === match.fixture.officialWinner) {
        return match.teamB;
      }
      return null;
    }

    function teamAAdvanceProbability(match) {
      if (match && match.fixture) {
        var fixtureProb = Number(match.fixture.teamAAdvanceProb);
        if (Number.isFinite(fixtureProb)) {
          return fixtureProb;
        }
      }
      var diff = teamStrength(match.teamA) - teamStrength(match.teamB);
      return 1 / (1 + Math.pow(10, -diff / 400));
    }

    function formatPct(value) {
      if (!Number.isFinite(value)) {
        return "";
      }
      return Math.round(value * 100) + "%";
    }

    function projectedWinner(match) {
      if (!match.teamA && !match.teamB) {
        return null;
      }
      if (match.teamA && !match.teamB) {
        return match.teamA;
      }
      if (!match.teamA && match.teamB) {
        return match.teamB;
      }
      if (match.fixture && match.fixture.modelWinner) {
        if (match.teamA && match.teamA.name === match.fixture.modelWinner) {
          return match.teamA;
        }
        if (match.teamB && match.teamB.name === match.fixture.modelWinner) {
          return match.teamB;
        }
      }
      return teamAAdvanceProbability(match) >= 0.5 ? match.teamA : match.teamB;
    }

    function winnerProbability(match, winner) {
      if (!winner) {
        return null;
      }
      if (match.teamA && !match.teamB && winner.name === match.teamA.name) {
        return 1;
      }
      if (!match.teamA && match.teamB && winner.name === match.teamB.name) {
        return 1;
      }
      if (!match.teamA || !match.teamB) {
        return null;
      }
      var pA = teamAAdvanceProbability(match);
      return winner.name === match.teamA.name ? pA : 1 - pA;
    }

    function matchupText(match) {
      var teamA = match.teamA ? match.teamA.name : match.slotA;
      var teamB = match.teamB ? match.teamB.name : match.slotB;
      return teamA + " vs " + teamB;
    }

    function clearLaterPicks(roundIndex) {
      Object.keys(picks).forEach(function (key) {
        var keyRound = Number(key.split("-")[0]);
        if (keyRound > roundIndex) {
          delete picks[key];
        }
      });
    }

    function buildRounds(sourcePicks) {
      var activePicks = sourcePicks || picks;
      var rounds = [data.round32.map(cloneMatch)];

      for (var roundIndex = 0; roundIndex < 4; roundIndex += 1) {
        var currentRound = rounds[roundIndex];
        var nextRound = Array.from({ length: Math.ceil(currentRound.length / 2) }, function (_, index) {
          return {
            slotA: "W" + (roundIndex + 1) + "." + (2 * index + 1),
            slotB: "W" + (roundIndex + 1) + "." + (2 * index + 2),
            teamA: null,
            teamB: null
          };
        });

        currentRound.forEach(function (match, matchIndex) {
          var key = roundIndex + "-" + matchIndex;
          var validNames = [match.teamA && match.teamA.name, match.teamB && match.teamB.name].filter(Boolean);
          if (activePicks === picks && picks[key] && validNames.indexOf(picks[key]) === -1) {
            delete picks[key];
          }
          var pickedName = activePicks[key];
          var official = officialWinner(match);
          var winner = pickedName
            ? (match.teamA && match.teamA.name === pickedName ? match.teamA : match.teamB)
            : (official || projectedWinner(match));
          var nextMatch = nextRound[Math.floor(matchIndex / 2)];
          if (matchIndex % 2 === 0) {
            nextMatch.teamA = cloneTeam(winner);
          } else {
            nextMatch.teamB = cloneTeam(winner);
          }
        });

        rounds.push(nextRound);
      }

      return rounds;
    }

    function renderModelPathPanel() {
      if (!modelPathPanel || !modelPathSummary || !modelPathRounds) {
        return;
      }

      modelPathPanel.hidden = !modelPathOpen;
      modelPathPanel.classList.toggle("is-visible", modelPathOpen);
      document.querySelectorAll("[data-bracket-action='model']").forEach(function (button) {
        button.textContent = modelPathOpen ? "Hide model path" : "Show model path";
        button.setAttribute("aria-expanded", String(modelPathOpen));
      });

      if (!modelPathOpen) {
        return;
      }

      var modelRounds = buildRounds({});
      var finalMatch = modelRounds[modelRounds.length - 1][0];
      var champion = officialWinner(finalMatch) || projectedWinner(finalMatch);
      var championProb = winnerProbability(finalMatch, champion);
      var completedStats = { matches: 0, hits: 0, misses: 0 };
      modelRounds.forEach(function (round) {
        round.forEach(function (match) {
          var official = officialWinner(match);
          if (!official) {
            return;
          }
          completedStats.matches += 1;
          var projected = projectedWinner(match);
          if (projected && projected.name === official.name) {
            completedStats.hits += 1;
          } else {
            completedStats.misses += 1;
          }
        });
      });

      var summaryCopy = completedStats.matches > 0
        ? completedStats.hits + " of " + completedStats.matches + " completed knockout calls still match the model path."
        : "Completed knockout results will lock into this path as soon as they are official.";

      modelPathSummary.innerHTML = champion
        ? "<div><span class='section-kicker'>Model path</span><h3>" + escapeHtml(champion.name) + " is the projected champion</h3><p>" + escapeHtml(summaryCopy) + " Completed knockout results stay locked while unresolved matches continue on the current model path.</p></div><div class='model-path-champion'><span>Final pick</span><strong>" + escapeHtml(champion.name) + "</strong><small>" + escapeHtml(champion.seed || "Projected seed") + " | final-match edge " + formatPct(championProb) + "</small></div>"
        : "<div><span class='section-kicker'>Model path</span><h3>Model path is pending</h3><p>The bracket needs at least one projected finalist before a full path can be shown.</p></div>";

      modelPathRounds.innerHTML = modelRounds.map(function (round, roundIndex) {
        var rows = round.map(function (match) {
          var official = officialWinner(match);
          var winner = official || projectedWinner(match);
          var projected = projectedWinner(match);
          var probability = winnerProbability(match, winner);
          var completedLabel = official
            ? ((projected && projected.name === official.name) ? "Official | model held" : "Official | model miss")
            : ((roundIndex === 0 ? "Current forecast" : "Projected"));
          var detailLabel = official
            ? ((match.fixture && match.fixture.actualScore ? match.fixture.actualScore + " | " : "") + (match.fixture && match.fixture.officialOutcome ? match.fixture.officialOutcome : "completed"))
            : ("advance probability " + (formatPct(probability) || "pending"));
          return "<li>" +
            "<span class='model-path-match'>" + escapeHtml(matchupText(match)) + "</span>" +
            "<strong>" + escapeHtml(winner ? winner.name : "Pending seed") + "</strong>" +
            "<small>" + escapeHtml(completedLabel) + " | " + escapeHtml(detailLabel) + "</small>" +
            "</li>";
        }).join("");
        return "<section class='model-path-round'><h4>" + escapeHtml(roundNames[roundIndex]) + "</h4><ol>" + rows + "</ol></section>";
      }).join("");
    }

    function teamButton(team, slot, probability, selected, modelSelected, userSelected, officialSelected, roundIndex, matchIndex, locked) {
      var button = document.createElement("button");
      button.type = "button";
      button.className = "bracket-team";

      if (selected) {
        button.classList.add("selected");
      }
      if (modelSelected) {
        button.classList.add("model-selected");
      }
      if (userSelected) {
        button.classList.add("user-selected");
      }
      if (officialSelected) {
        button.classList.add("official-selected");
      }
      if (!team) {
        button.classList.add("empty");
        button.disabled = true;
        button.innerHTML = "<span class='team-name'>" + escapeHtml(slot) + "</span><small>Seed unresolved</small>";
        return button;
      }

      var label = locked ? (officialSelected ? "Official result" : "Eliminated") : (userSelected ? "User pick" : (modelSelected ? "Model pick" : "Contender"));
      button.innerHTML =
        "<span class='team-name'>" + escapeHtml(team.name) + "</span>" +
        "<span class='team-meta'>" + escapeHtml(team.seed || "Seed") + " | " + formatPct(probability) + "</span>" +
        "<small class='pick-label'>" + escapeHtml(label) + "</small>";
      button.setAttribute("aria-label", (locked ? "Official result for " : "Advance ") + team.name + " from " + roundNames[roundIndex]);
      if (locked) {
        button.disabled = true;
      } else {
        button.addEventListener("click", function () {
          picks[roundIndex + "-" + matchIndex] = team.name;
          clearLaterPicks(roundIndex);
          announce(team.name + " advanced from " + roundNames[roundIndex] + ".");
          render();
        });
      }
      return button;
    }

    function matchCard(match, roundIndex, matchIndex) {
      var card = document.createElement("article");
      card.className = "bracket-match-card";
      var pA = match.teamA && match.teamB ? teamAAdvanceProbability(match) : null;
      var pB = Number.isFinite(pA) ? 1 - pA : null;
      var projected = projectedWinner(match);
      var official = officialWinner(match);
      var pickedName = picks[roundIndex + "-" + matchIndex];
      var selectedName = pickedName || (official ? official.name : (projected && projected.name));
      var locked = Boolean(official);

      var label = document.createElement("div");
      label.className = "bracket-match-label";
      label.textContent = "Match " + (matchIndex + 1);
      card.appendChild(label);
      card.appendChild(teamButton(
        match.teamA,
        match.slotA,
        pA,
        match.teamA && match.teamA.name === selectedName,
        !pickedName && !locked && projected && match.teamA && match.teamA.name === projected.name,
        pickedName && match.teamA && match.teamA.name === pickedName,
        official && match.teamA && match.teamA.name === official.name,
        roundIndex,
        matchIndex,
        locked
      ));
      card.appendChild(teamButton(
        match.teamB,
        match.slotB,
        pB,
        match.teamB && match.teamB.name === selectedName,
        !pickedName && !locked && projected && match.teamB && match.teamB.name === projected.name,
        pickedName && match.teamB && match.teamB.name === pickedName,
        official && match.teamB && match.teamB.name === official.name,
        roundIndex,
        matchIndex,
        locked
      ));

      if (match.fixture) {
        var note = document.createElement("div");
        note.className = "bracket-match-note";
        if (official) {
          var modelMiss = projected && projected.name !== official.name;
          note.classList.add(modelMiss ? "is-miss" : "is-hit");
          note.innerHTML = "<strong>Official:</strong> " +
            escapeHtml(official.name) +
            (match.fixture.actualScore ? " " + escapeHtml(match.fixture.actualScore) : "") +
            (match.fixture.officialOutcome ? " | " + escapeHtml(match.fixture.officialOutcome) : "") +
            "<span>" + (modelMiss ? "Model miss" : "Model held") + "</span>";
        } else {
          var pick = projected ? projected.name : "Pending";
          var levelText = Number.isFinite(Number(match.fixture.regulationDrawProb)) ? formatPct(Number(match.fixture.regulationDrawProb)) : "pending";
          note.classList.add("is-live");
          note.innerHTML = "<strong>" + escapeHtml(match.fixture.timing || "Forecast") + ":</strong> " +
            escapeHtml(pick) + " " + (formatPct(winnerProbability(match, projected)) || "") +
            " <span>Level after 90: " + escapeHtml(levelText) + "</span>";
        }
        card.appendChild(note);
      }

      return card;
    }

    function renderSeeds() {
      if (seedWatch && data.groupSeeds) {
        var seedsByGroup = {};
        data.groupSeeds.forEach(function (row) {
          seedsByGroup[row.group] = seedsByGroup[row.group] || [];
          seedsByGroup[row.group].push(row);
        });
        seedWatch.innerHTML = Object.keys(seedsByGroup).sort().map(function (group) {
          var rows = seedsByGroup[group].slice(0, 2).map(function (row) {
            return "<span><strong>" + escapeHtml(row.seed) + "</strong>" + escapeHtml(row.team) + "</span>";
          }).join("");
          return "<div class='seed-group'><b>Group " + escapeHtml(group) + "</b>" + rows + "</div>";
        }).join("");
      }

      if (thirdWatch && data.thirdWatch) {
        thirdWatch.innerHTML = data.thirdWatch.map(function (row) {
          return "<div class='third-row" + (row.qualifies ? " qualifies" : "") + "'>" +
            "<span>" + escapeHtml(row.third_rank) + ". " + escapeHtml(row.team) + "</span>" +
            "<strong>" + escapeHtml(row.points) + " pts</strong>" +
            "</div>" +
            (row.third_rank === 8 ? "<div class='third-cut'>Cut line</div>" : "");
        }).join("");
      }
    }

    function renderTabs() {
      if (!tabsNode) {
        return;
      }
      tabsNode.innerHTML = "";
      roundNames.forEach(function (name, index) {
        var tab = document.createElement("button");
        tab.type = "button";
        tab.className = "bracket-tab";
        tab.setAttribute("role", "tab");
        tab.setAttribute("aria-selected", String(index === activeRound));
        tab.textContent = shortRoundNames[index];
        tab.addEventListener("click", function () {
          activeRound = index;
          fullView = false;
          render();
        });
        tabsNode.appendChild(tab);
      });
    }

    function render() {
      var rounds = buildRounds();
      root.innerHTML = "";
      root.setAttribute("data-view", fullView ? "full" : "round");

      rounds.forEach(function (round, roundIndex) {
        var column = document.createElement("section");
        column.className = "bracket-round";
        if (!fullView && roundIndex === activeRound) {
          column.classList.add("is-active");
        }
        var heading = document.createElement("h3");
        heading.textContent = roundNames[roundIndex];
        column.appendChild(heading);
        var list = document.createElement("div");
        list.className = "bracket-round-list";
        round.forEach(function (match, matchIndex) {
          list.appendChild(matchCard(match, roundIndex, matchIndex));
        });
        column.appendChild(list);
        root.appendChild(column);
      });

      var finalMatch = rounds[rounds.length - 1][0];
      var champion = picks["4-0"]
        ? (finalMatch.teamA && finalMatch.teamA.name === picks["4-0"] ? finalMatch.teamA : finalMatch.teamB)
        : (officialWinner(finalMatch) || projectedWinner(finalMatch));
      championNode.innerHTML = champion
        ? "<span>Projected Champion</span><strong>" + escapeHtml(champion.name) + "</strong><small>" + escapeHtml(champion.seed || "Projected seed") + " | strength " + escapeHtml(champion.elo || "pending") + "</small>"
        : "";
      renderTabs();
      renderModelPathPanel();
      document.querySelectorAll("[data-bracket-action='toggle-view']").forEach(function (button) {
        button.textContent = fullView ? "Round view" : "Full bracket";
        button.setAttribute("aria-pressed", String(fullView));
      });
    }

    document.querySelectorAll("[data-bracket-action]").forEach(function (button) {
      button.addEventListener("click", function () {
        var action = button.getAttribute("data-bracket-action");
        if (action === "toggle-view") {
          fullView = !fullView;
          render();
          return;
        }
        if (action === "model") {
          modelPathOpen = !modelPathOpen;
          if (modelPathOpen) {
            Object.keys(picks).forEach(function (key) {
              delete picks[key];
            });
            announce("Showing the model path through the bracket.");
          } else {
            announce("Model path hidden.");
          }
          render();
          if (modelPathOpen && modelPathPanel) {
            modelPathPanel.focus({ preventScroll: true });
            modelPathPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
          }
          return;
        }
        Object.keys(picks).forEach(function (key) {
          delete picks[key];
        });
        modelPathOpen = false;
        announce("Bracket picks cleared.");
        render();
      });
    });

    renderSeeds();
    render();
  }

  ready(function () {
    formatLocalTimes();
    initBracket();
  });
})();
</script>

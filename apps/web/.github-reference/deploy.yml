name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run build

      - name: Add SPA route entrypoints
        if: github.event_name != 'pull_request'
        run: |
          cp dist/index.html dist/404.html
          for route in desk approval datasets signals edge portfolio model bankroll coverage dictionary quality basket explore raw nba mlb status; do
            mkdir -p "dist/${route}"
            cp dist/index.html "dist/${route}/index.html"
          done

      - uses: actions/configure-pages@v5
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

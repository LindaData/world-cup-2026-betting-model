project:
  type: website
  output-dir: docs
  resources:
    - assets/favicon.svg
    - assets/social-preview.svg
  render:
    - index.qmd
    - reports/00_data_overview.qmd
    - reports/01_goals_linear_regression.qmd
    - reports/05_poisson_goals_model.qmd
    - reports/02_ordinal_result_model.qmd
    - reports/06_regression_diagnostics.qmd
    - reports/07_fixture_predictions.qmd
    - reports/08_matchday_predictions.qmd
    - reports/09_multisport_expansion.qmd
    - reports/03_distribution_review.qmd
    - reports/04_knn_similarity_model.qmd
    - reports/10_model_challengers.qmd

website:
  title: "World Cup 2026 Forecasting Model"
  site-url: "https://lindadata.github.io/world-cup-2026-betting-model/"
  repo-url: "https://github.com/LindaData/world-cup-2026-betting-model"
  description: "Static World Cup 2026 match probabilities, projected scores, bracket projections, and model performance notes."
  favicon: assets/favicon.svg
  navbar:
    background: "#102a43"
    left:
      - href: index.qmd
        text: Home
      - href: reports/08_matchday_predictions.qmd
        text: Predictions
      - href: reports/08_matchday_predictions.qmd#bracket
        text: Bracket
      - href: reports/00_data_overview.qmd
        text: Coverage
      - text: Methodology
        menu:
          - href: reports/08_matchday_predictions.qmd#model-performance
            text: Model Performance
          - href: reports/07_fixture_predictions.qmd
            text: Model Overview
          - href: reports/05_poisson_goals_model.qmd
            text: Goals Forecast
          - href: reports/02_ordinal_result_model.qmd
            text: Win / Draw / Loss Model
          - href: reports/04_knn_similarity_model.qmd
            text: Similar Match Model
          - href: reports/10_model_challengers.qmd
            text: Model Challengers
          - href: reports/03_distribution_review.qmd
            text: Distribution Checks
          - href: reports/06_regression_diagnostics.qmd
            text: Diagnostics
          - href: reports/09_multisport_expansion.qmd
            text: Multi-Sport Roadmap
    right:
      - text: GitHub
        href: https://github.com/LindaData/world-cup-2026-betting-model
  page-footer:
    left: "LindaData World Cup 2026 forecasting model."
    right: "Static forecasts built with R, Python, SQL, DuckDB, and Quarto."

format:
  html:
    theme: cosmo
    css: styles.css
    include-after-body: assets/site-after-body.html
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    code-summary: "Show code"
    smooth-scroll: true
    link-external-newwindow: true
    fig-align: center
    open-graph: true
    twitter-card: true

execute:
  echo: true
  warning: false
  message: false
  freeze: false

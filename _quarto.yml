project:
  type: website
  output-dir: docs
  resources:
    - assets/favicon.svg
    - assets/social-preview.png
    - assets/social-preview.svg
    - assets/site.webmanifest
    - assets/lindadata-ui.css
    - robots.txt
  render:
    - index.qmd
    - reports/00_data_overview.qmd
    - reports/01_goals_linear_regression.qmd
    - reports/05_poisson_goals_model.qmd
    - reports/02_ordinal_result_model.qmd
    - reports/06_regression_diagnostics.qmd

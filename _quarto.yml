        href: https://github.com/LindaData/world-cup-2026-betting-model
  page-footer:
    left: "LindaData World Cup 2026 forecasting model."
    right: "Built with R, Python, SQL, DuckDB, and Quarto."

format:
  html:
    theme: cosmo
    css: styles.css
    include-after-body: assets/site-after-body.html
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    code-summary: "Show code"
    smooth-scroll: true
    link-external-newwindow: true
    fig-align: center
    open-graph: true
    twitter-card: true

execute:
  echo: true
  warning: false
  message: false
  freeze: false

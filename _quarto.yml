  description: "Match probabilities, projected scores, and tournament simulations powered by historical results and team-strength models."
  favicon: assets/favicon.svg
  navbar:
    background: "#102a43"
    left:
      - href: index.qmd
        text: Home
      - href: reports/08_matchday_predictions.qmd
        text: Predictions
      - href: reports/08_matchday_predictions.qmd#bracket
        text: Bracket
      - text: Models
        menu:
          - href: reports/07_fixture_predictions.qmd
            text: Model Overview
          - href: reports/05_poisson_goals_model.qmd
            text: Goals Forecast
          - href: reports/02_ordinal_result_model.qmd
            text: Win / Draw / Loss Model
          - href: reports/04_knn_similarity_model.qmd
            text: Similar Match Model
          - href: reports/01_goals_linear_regression.qmd
            text: OLS Benchmark
      - text: Methodology
        menu:
          - href: reports/00_data_overview.qmd
            text: Data & Coverage
          - href: reports/08_matchday_predictions.qmd#model-performance
            text: Model Performance

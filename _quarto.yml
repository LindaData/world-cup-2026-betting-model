project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - reports/01_goals_linear_regression.qmd
    - reports/02_ordinal_result_model.qmd
    - reports/03_distribution_review.qmd
    - reports/04_knn_similarity_model.qmd

website:
  title: "2026 World Cup Betting Model"
  site-url: "https://lindadata.github.io/world-cup-2026-betting-model/"
  repo-url: "https://github.com/LindaData/world-cup-2026-betting-model"
  repo-actions: [source]
  navbar:
    background: "#102a43"
    left:
      - href: index.qmd
        text: About
      - href: reports/01_goals_linear_regression.qmd
        text: Goals Model
      - href: reports/02_ordinal_result_model.qmd
        text: Result Model
      - href: reports/04_knn_similarity_model.qmd
        text: KNN Model
      - href: reports/03_distribution_review.qmd
        text: Distributions
    right:
      - text: LindaData
        href: https://lindadata.github.io/
      - text: GitHub
        href: https://github.com/LindaData/world-cup-2026-betting-model
  page-footer:
    left: "LindaData 2026 World Cup model."
    right: "Built with R, Python, SQL, DuckDB, and Quarto."

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    code-summary: "Show code"
    smooth-scroll: true
    link-external-newwindow: true
    fig-align: center

execute:
  echo: true
  warning: false
  message: false
  freeze: false

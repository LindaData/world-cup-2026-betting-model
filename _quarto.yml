website:
  title: "LindaData World Cup Forecasting Hub"
  site-url: "https://lindadata.github.io/world-cup-2026-betting-model/"
  repo-url: "https://github.com/LindaData/world-cup-2026-betting-model"
  description: "LindaData World Cup 2026 forecasting command center with match probabilities, bracket projections, model review, and project operating context."
  favicon: assets/favicon.svg
  navbar:
    title: "LindaData · World Cup"
    background: "#102a43"
    left:
      - href: index.qmd
        text: HQ
      - href: reports/08_matchday_predictions.qmd
        text: Predictions
      - href: reports/08_matchday_predictions.qmd#bracket
        text: Bracket
      - href: reports/08_matchday_predictions.qmd#model-review
        text: Model Review
      - href: reports/11_game_archive.qmd
        text: Archive
      - href: reports/00_data_overview.qmd
        text: Coverage
      - text: Model Lab
        menu:
          - href: reports/10_model_challengers.qmd
            text: Challenger Bench
          - href: reports/07_fixture_predictions.qmd
            text: Model Overview
          - href: reports/05_poisson_goals_model.qmd
            text: Goals Forecast
          - href: reports/02_ordinal_result_model.qmd
            text: Win / Draw / Loss Model
          - href: reports/04_knn_similarity_model.qmd
            text: Similar Match Model
          - href: reports/03_distribution_review.qmd
            text: Distribution Checks
          - href: reports/06_regression_diagnostics.qmd
            text: Diagnostics
      - text: Ops
        menu:
          - href: reports/12_film_study_workflow.qmd
            text: Film Study Workflow
          - href: reports/09_multisport_expansion.qmd
            text: Multi-Sport Roadmap
    right:
      - text: LindaData HQ
        href: https://lindadata.github.io/
      - text: GitHub
        href: https://github.com/LindaData/world-cup-2026-betting-model
  page-footer:
    left: "LindaData World Cup 2026 forecasting hub."
    right: "Static forecasts built with R, Python, SQL, DuckDB, Quarto, and GitHub Pages."

format:
  html:
    theme: cosmo
    css:
      - styles.css
      - assets/lindadata-ui.css
    canonical-url: true
    include-in-header: assets/seo.html
    include-after-body: assets/site-after-body.html
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    code-summary: "Show code"
    smooth-scroll: true
    link-external-newwindow: true
    fig-align: center
    open-graph: true
    twitter-card: true

execute:
  echo: true
  warning: false
  message: false
  freeze: false
